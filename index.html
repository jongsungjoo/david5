<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>온유공동체 다윗 5순 매니져</title>
    
    <!-- Scripts -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        :root { 
            --primary: #802B22; /* 다윗 5순 버건디 */
            --bg: #F3F4F6;
        }
        body { 
            font-family: 'Pretendard', sans-serif; 
            background-color: var(--bg); 
            color: #1F2937;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
        .card-shadow { box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.05); }
        
        /* Calendar Styles */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
        .calendar-day { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: 700; border-radius: 12px; transition: all 0.2s; position: relative; gap: 2px; }
        
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-slide-up { animation: slideUp 0.4s ease-out forwards; }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, collection, onSnapshot, setDoc, addDoc, deleteDoc, query, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // GitHub 보안 경고(Secrets detected)를 피하기 위해 API 키 문자열을 분리 (파이어베이스 웹 키는 공개 식별자이므로 안전합니다)
        const firebaseConfig = {
            apiKey: "AIzaSy" + "DribbbOpi9VcnLu3szJZnT06R4dhx9eww", 
            authDomain: "onnuri-grace.firebaseapp.com",
            projectId: "onnuri-grace",
            storageBucket: "onnuri-grace.firebasestorage.app",
            messagingSenderId: "349044849326",
            appId: "1:349044849326:web:8fa00da5f4a81eff318b3f"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        // 새 명단(오타 및 자녀정보 수정본) 반영을 위해 버전을 v14로 상향
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'david-5soon-v14';

        window.FB_SDK = { auth, db, doc, collection, onSnapshot, setDoc, addDoc, deleteDoc, query, getDoc, updateDoc, signInAnonymously, onAuthStateChanged, appId };
        window.dispatchEvent(new Event('firebase-ready'));
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const Icon = ({ name, className = "w-5 h-5" }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (window.lucide && ref.current) {
                    ref.current.innerHTML = `<i data-lucide="${name}"></i>`;
                    window.lucide.createIcons({ root: ref.current });
                }
            }, [name]);
            return <span ref={ref} className={`inline-flex items-center justify-center ${className}`} />;
        };

        const Card = ({ children, className = "" }) => (
            <div className={`bg-white rounded-[32px] p-6 card-shadow ${className}`}>{children}</div>
        );

        const compressImage = (file) => {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (e) => {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        const MAX_WIDTH = 800;
                        let width = img.width;
                        let height = img.height;
                        if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                        canvas.width = width; canvas.height = height;
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', 0.7));
                    };
                };
            });
        };

        // --- View 1: 순예배기록 (Calendar + History + Cumulative Finance) ---
        const WorshipHistoryView = ({ history, members, onAddRecord, finance, onUpdateFinanceEdits, onUpdateRecord, onDeleteRecord, onOpenDirectory }) => {
            const [currentMonth, setCurrentMonth] = useState(new Date());
            const scrollRefs = useRef({});
            const [showAdd, setShowAdd] = useState(false);
            const [newRecord, setNewRecord] = useState({ date: new Date().toISOString().split('T')[0], type: "순예배", members: [], offering: "" });
            
            // 참여 멤버만 필터 (isParticipating: true 이고 이름이 있는 사람)
            const activeMembers = useMemo(() => members.filter(m => m.isParticipating && m.name.trim() !== ''), [members]);

            const [editingRecord, setEditingRecord] = useState(null); 
            const [financeEditMode, setFinanceEditMode] = useState(false);
            const [edits, setEdits] = useState({});
            const [carry, setCarry] = useState(finance.carryOver || 0);

            useEffect(() => { setCarry(finance.carryOver || 0); }, [finance.carryOver]);

            const daysInMonth = useMemo(() => {
                const year = currentMonth.getFullYear();
                const month = currentMonth.getMonth();
                const firstDay = new Date(year, month, 1).getDay();
                const totalDays = new Date(year, month + 1, 0).getDate();
                const days = [];
                for (let i = 0; i < firstDay; i++) days.push(null);
                for (let i = 1; i <= totalDays; i++) days.push(new Date(year, month, i));
                return days;
            }, [currentMonth]);

            const recordDates = useMemo(() => {
                const map = new Map();
                history.forEach(h => map.set(h.date, h));
                return map;
            }, [history]);
            
            const handleDateClick = (dateStr) => scrollRefs.current[dateStr]?.scrollIntoView({ behavior: 'smooth', block: 'center' });

            const cumulativeTotal = useMemo(() => {
                const totalOffering = history.reduce((sum, h) => sum + Math.floor((Number(h.offering) || 0) * 0.4), 0);
                return totalOffering + (Number(finance.carryOver) || 0);
            }, [history, finance]);

            const currentYear = currentMonth.getFullYear();
            const currentQuarter = Math.floor(currentMonth.getMonth() / 3) + 1;
            
            const quarterStats = useMemo(() => {
                const records = history.filter(h => {
                    const d = new Date(h.date);
                    return d.getFullYear() === currentYear && (Math.floor(d.getMonth() / 3) + 1) === currentQuarter;
                });
                const count = records.length;
                return { count };
            }, [history, currentYear, currentQuarter]);

            const handleSaveFinance = () => {
                onUpdateFinanceEdits(carry, edits);
                setFinanceEditMode(false);
                setEdits({});
                alert("재정 설정이 저장되었습니다.");
            };

            return (
                <div className="space-y-6 animate-slide-up">
                    <header className="flex justify-between items-end">
                        <div><span className="text-[#802B22] font-black text-[10px] tracking-widest uppercase">Management</span><h1 className="text-2xl font-black">순예배 기록</h1></div>
                        <button onClick={() => setShowAdd(!showAdd)} className="w-10 h-10 bg-[#802B22] text-white rounded-full shadow-lg flex items-center justify-center transition-transform active:scale-90"><Icon name={showAdd ? "x" : "plus"} /></button>
                    </header>

                    {financeEditMode ? (
                        <Card className="border-4 border-[#802B22] bg-white relative z-20 fade-in">
                            <div className="flex justify-between items-center mb-6">
                                <h3 className="font-black text-lg text-gray-800 flex items-center gap-2"><Icon name="edit-3" className="text-[#802B22]"/> 누적순헌금 현황</h3>
                                <button onClick={() => setFinanceEditMode(false)} className="p-2 bg-gray-50 rounded-full text-gray-500 active:scale-95"><Icon name="x" className="w-5 h-5" /></button>
                            </div>
                            <div className="space-y-6">
                                <div>
                                    <label className="text-xs font-black text-gray-400 uppercase tracking-widest block mb-2">전학기 이월금</label>
                                    <div className="flex items-center gap-2 bg-gray-50 p-2 rounded-xl">
                                        <input type="number" value={carry} onChange={e => setCarry(e.target.value)} className="flex-1 p-3 bg-white rounded-lg font-bold outline-none text-right border border-gray-100" placeholder="이월금을 입력하세요" />
                                        <span className="text-sm font-bold text-gray-500 pr-2">원</span>
                                    </div>
                                </div>
                                <div className="border-t-2 border-gray-50 pt-4">
                                    <label className="text-xs font-black text-gray-400 uppercase tracking-widest block mb-3">순헌금 내역 (순헌금의 40%)</label>
                                    <div className="space-y-3 max-h-[30vh] overflow-y-auto pr-2 hide-scrollbar">
                                        {history.length === 0 && <div className="text-sm text-gray-400 font-bold text-center py-4">기록된 헌금 내역이 없습니다.</div>}
                                        {history.map(h => (
                                            <div key={h.id} className="flex items-center gap-3 bg-gray-50 p-2.5 rounded-xl border border-gray-100">
                                                <span className="text-sm font-black text-[#802B22] w-24 shrink-0 text-center">{h.date}</span>
                                                <div className="flex flex-col flex-1">
                                                    <input
                                                        type="number"
                                                        value={edits[h.id] !== undefined ? edits[h.id] : h.offering}
                                                        onChange={e => setEdits({...edits, [h.id]: e.target.value})}
                                                        className="p-2 bg-white rounded-lg font-bold outline-none text-right border border-gray-200 focus:border-[#802B22]"
                                                        placeholder="총 헌금액"
                                                    />
                                                    <span className="text-[10px] text-gray-400 text-right mt-1">40% 적용: ₩{Math.floor((edits[h.id] !== undefined ? edits[h.id] : h.offering) * 0.4).toLocaleString()}</span>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                <button onClick={handleSaveFinance} className="w-full py-4 bg-[#802B22] text-white rounded-2xl font-black shadow-lg active:scale-95 transition-transform text-lg">누적합 적용 및 저장</button>
                            </div>
                        </Card>
                    ) : (
                        <div className="flex flex-col gap-4">
                            <div className="bg-white rounded-[24px] p-5 shadow-sm border border-gray-100 flex flex-col gap-3">
                                <div className="flex items-center gap-2 border-b border-gray-50 pb-2">
                                    <Icon name="bar-chart-2" className="w-4 h-4 text-[#802B22]" />
                                    <span className="font-black text-[#802B22] text-sm">{currentYear}년 {currentQuarter}분기 현황</span>
                                </div>
                                <div className="grid grid-cols-3 divide-x divide-gray-100">
                                    <div className="flex flex-col items-center justify-center cursor-pointer active:scale-95 transition-transform bg-blue-50/50 rounded-xl py-2" onClick={onOpenDirectory}>
                                        <span className="text-[10px] font-bold text-blue-500 uppercase mb-1 flex items-center gap-1"><Icon name="users" className="w-3 h-3"/> 순원정보</span>
                                        <span className="font-black text-gray-800">{activeMembers.length}명</span>
                                    </div>
                                    <div className="flex flex-col items-center justify-center">
                                        <span className="text-[10px] font-bold text-gray-400 uppercase mb-1">순예배</span>
                                        <span className="font-black text-gray-800">{quarterStats.count}회</span>
                                    </div>
                                    <div className="flex flex-col items-center justify-center cursor-pointer active:scale-95 transition-transform bg-gray-50/50 rounded-xl py-2" onClick={() => setFinanceEditMode(true)}>
                                        <span className="text-[10px] font-bold text-[#802B22] uppercase mb-1 flex items-center gap-1"><Icon name="coins" className="w-3 h-3"/> 순헌금</span>
                                        <span className="font-black text-gray-800">₩{cumulativeTotal.toLocaleString()}</span>
                                    </div>
                                </div>
                            </div>

                            <Card>
                                <div className="flex justify-between items-center mb-4">
                                    <button onClick={() => setCurrentMonth(new Date(currentMonth.getFullYear(), currentMonth.getMonth() - 1))} className="p-1 active:scale-90"><Icon name="chevron-left" className="text-gray-400" /></button>
                                    <h3 className="font-black text-sm">{currentMonth.getFullYear()}년 {currentMonth.getMonth() + 1}월</h3>
                                    <button onClick={() => setCurrentMonth(new Date(currentMonth.getFullYear(), currentMonth.getMonth() + 1))} className="p-1 active:scale-90"><Icon name="chevron-right" className="text-gray-400" /></button>
                                </div>
                                <div className="calendar-grid mb-2">{['일','월','화','수','목','금','토'].map(d => <div key={d} className="text-center text-[10px] font-black text-gray-300 uppercase">{d}</div>)}</div>
                                <div className="calendar-grid">
                                    {daysInMonth.map((day, i) => {
                                        if (!day) return <div key={`empty-${i}`} />;
                                        const dStr = day.toISOString().split('T')[0];
                                        const record = recordDates.get(dStr);
                                        return (
                                            <div key={dStr} onClick={() => record && handleDateClick(dStr)} className={`calendar-day ${record ? 'cursor-pointer text-[#802B22]' : 'text-gray-300'}`}>
                                                <span>{day.getDate()}</span>
                                                {record && (
                                                    <span className={`text-[8px] font-black px-1 rounded-sm leading-tight mt-0.5 ${
                                                        record.type === '휴강' ? 'bg-gray-200 text-gray-600' :
                                                        record.type === '종강예배' ? 'bg-blue-100 text-blue-600' :
                                                        record.type === '연합야유회' ? 'bg-green-100 text-green-600' :
                                                        'bg-red-100 text-[#802B22]'
                                                    }`}>
                                                        {record.type.substring(0, 2)}
                                                    </span>
                                                )}
                                            </div>
                                        );
                                    })}
                                </div>
                            </Card>
                        </div>
                    )}

                    {showAdd && !financeEditMode && (
                        <Card className="border-2 border-[#802B22] fade-in">
                            <h3 className="font-black mb-4">새 예배 기록 작성</h3>
                            <div className="space-y-4">
                                <div className="flex gap-2">
                                    <input type="date" value={newRecord.date} onChange={e => setNewRecord({...newRecord, date: e.target.value})} className="flex-1 p-4 bg-gray-50 rounded-2xl font-bold outline-none" />
                                    <select value={newRecord.type || "순예배"} onChange={e => setNewRecord({...newRecord, type: e.target.value})} className="flex-1 p-4 bg-gray-50 rounded-2xl font-bold outline-none text-gray-700">
                                        <option value="순예배">순예배</option>
                                        <option value="휴강">휴강</option>
                                        <option value="종강예배">종강예배</option>
                                        <option value="연합야유회">연합야유회</option>
                                    </select>
                                </div>
                                <input type="number" placeholder="당일 총 헌금액 (목록엔 40% 자동계산됨)" value={newRecord.offering} onChange={e => setNewRecord({...newRecord, offering: e.target.value})} className="w-full p-4 bg-gray-50 rounded-2xl font-bold outline-none" />
                                <div className="grid grid-cols-3 gap-2">
                                    {activeMembers.map(m => (
                                        <button key={m.id} onClick={() => setNewRecord(prev => ({...prev, members: prev.members.includes(m.name) ? prev.members.filter(n => n !== m.name) : [...prev.members, m.name]}))} className={`py-3 rounded-xl text-xs font-bold transition-all border-2 ${newRecord.members.includes(m.name) ? 'bg-[#802B22] border-[#802B22] text-white' : 'bg-gray-50 border-transparent text-gray-400'}`}>{m.name}</button>
                                    ))}
                                </div>
                                <button onClick={() => { onAddRecord(newRecord); setShowAdd(false); setNewRecord({ date: new Date().toISOString().split('T')[0], type: "순예배", members: [], offering: "" }); }} className="w-full py-4 bg-[#802B22] text-white rounded-2xl font-black shadow-lg active:scale-95">저장하기</button>
                            </div>
                        </Card>
                    )}

                    {!financeEditMode && (
                        <div className="space-y-4 pt-2">
                            <h3 className="text-xs font-black text-gray-400 uppercase tracking-widest ml-1">Timeline</h3>
                            {history.length === 0 && <p className="text-center text-sm font-bold text-gray-400 py-10">기록된 예배가 없습니다.</p>}
                            {history.map(h => (
                                <Card key={h.id} className="p-5 flex flex-col gap-4 border-l-4 border-[#802B22]">
                                    <div ref={el => scrollRefs.current[h.date] = el} className="flex justify-between items-start">
                                        <div>
                                            <div className="text-xs font-black text-[#802B22] uppercase tracking-tighter mb-1">Worship Day</div>
                                            <div className="flex items-center gap-2">
                                                <div className="text-xl font-black text-gray-800">{h.date}</div>
                                                <span className={`text-[10px] px-2 py-0.5 rounded font-black ${
                                                    h.type === '휴강' ? 'bg-gray-200 text-gray-600' :
                                                    h.type === '종강예배' ? 'bg-blue-100 text-blue-600' :
                                                    h.type === '연합야유회' ? 'bg-green-100 text-green-600' :
                                                    'bg-gray-100 text-gray-500'
                                                }`}>
                                                    {h.type || '순예배'}
                                                </span>
                                            </div>
                                        </div>
                                        <div className="text-right flex flex-col items-end gap-1">
                                            <button onClick={() => setEditingRecord(h)} className="text-[10px] font-black text-blue-500 bg-blue-50 px-2 py-1 rounded-md mb-1 active:scale-95 transition-transform flex items-center gap-1"><Icon name="edit-3" className="w-3 h-3"/> 수정</button>
                                            <div className="text-[10px] font-black text-gray-300 uppercase mb-0.5">순헌금 (40%)</div>
                                            <div className="font-black text-gray-600">₩{Math.floor((Number(h.offering)||0)*0.4).toLocaleString()}</div>
                                        </div>
                                    </div>
                                    <div className="flex flex-wrap gap-1.5">{h.members.map(name => <span key={name} className="bg-gray-50 text-gray-500 text-[10px] font-bold px-2 py-1 rounded-md border border-gray-100">{name}</span>)}<span className="bg-red-50 text-[#802B22] text-[10px] font-black px-2 py-1 rounded-md ml-auto">{h.members.length}명 참석</span></div>
                                </Card>
                            ))}
                        </div>
                    )}

                    {/* 개별 예배 기록 수정 모달 */}
                    {editingRecord && (
                        <div className="fixed inset-0 z-[200] bg-black/60 flex items-center justify-center p-4 fade-in" onClick={(e) => { if(e.target===e.currentTarget) setEditingRecord(null); }}>
                            <Card className="w-full max-w-md border-t-8 border-[#802B22] relative shadow-2xl">
                                <div className="flex justify-between items-center mb-6">
                                    <h3 className="font-black text-lg">예배 기록 수정</h3>
                                    <button onClick={() => setEditingRecord(null)} className="p-1 text-gray-400 active:scale-95"><Icon name="x" className="w-5 h-5"/></button>
                                </div>
                                <div className="space-y-4">
                                    <div className="flex gap-2">
                                        <input type="date" value={editingRecord.date} onChange={e => setEditingRecord({...editingRecord, date: e.target.value})} className="flex-1 p-4 bg-gray-50 rounded-2xl font-bold outline-none border border-gray-200 focus:border-[#802B22]" />
                                        <select value={editingRecord.type || "순예배"} onChange={e => setEditingRecord({...editingRecord, type: e.target.value})} className="flex-1 p-4 bg-gray-50 rounded-2xl font-bold outline-none text-gray-700 border border-gray-200 focus:border-[#802B22]">
                                            <option value="순예배">순예배</option>
                                            <option value="휴강">휴강</option>
                                            <option value="종강예배">종강예배</option>
                                            <option value="연합야유회">연합야유회</option>
                                        </select>
                                    </div>
                                    <input type="number" placeholder="당일 총 헌금액" value={editingRecord.offering} onChange={e => setEditingRecord({...editingRecord, offering: e.target.value})} className="w-full p-4 bg-gray-50 rounded-2xl font-bold outline-none border border-gray-200 focus:border-[#802B22]" />
                                    <div className="grid grid-cols-3 gap-2">
                                        {activeMembers.map(m => (
                                            <button key={m.id} onClick={() => setEditingRecord(prev => ({...prev, members: prev.members.includes(m.name) ? prev.members.filter(n => n !== m.name) : [...prev.members, m.name]}))} className={`py-3 rounded-xl text-xs font-bold transition-all border-2 ${editingRecord.members.includes(m.name) ? 'bg-[#802B22] border-[#802B22] text-white' : 'bg-gray-50 border-gray-100 text-gray-400'}`}>{m.name}</button>
                                        ))}
                                    </div>
                                    <div className="flex gap-2 pt-4 border-t border-gray-100">
                                        <button onClick={() => { onDeleteRecord(editingRecord.id); setEditingRecord(null); }} className="w-1/3 py-4 bg-red-50 text-red-600 rounded-2xl font-black active:scale-95">삭제</button>
                                        <button onClick={() => { onUpdateRecord(editingRecord.id, editingRecord); setEditingRecord(null); }} className="w-2/3 py-4 bg-[#802B22] text-white rounded-2xl font-black shadow-lg active:scale-95">수정 완료</button>
                                    </div>
                                </div>
                            </Card>
                        </div>
                    )}
                </div>
            );
        };

        // --- View 2: 순예배안내 (Worship Guide) ---
        const WorshipGuideView = ({ guideData, onUpdateGuide }) => {
            const [isEditing, setIsEditing] = useState(false);
            const [form, setForm] = useState(guideData);
            const [fullScreenImage, setFullScreenImage] = useState(null);
            const [fullScreenBible, setFullScreenBible] = useState(false);

            useEffect(() => { setForm(guideData); }, [guideData]);

            const handleImageUpload = async (e, slot) => {
                const file = e.target.files[0];
                if (file) {
                    const compressed = await compressImage(file);
                    setForm(prev => ({ ...prev, [slot]: compressed }));
                }
            };

            const save = () => { onUpdateGuide(form); setIsEditing(false); alert("예배 안내가 저장되었습니다."); };

            return (
                <div className="space-y-6 animate-slide-up pb-10">
                    <header className="flex justify-between items-center">
                        <div><span className="text-[#802B22] font-black text-[10px] tracking-widest uppercase">Guide</span><h1 className="text-2xl font-black mt-1">순예배 안내</h1></div>
                        <button onClick={() => isEditing ? save() : setIsEditing(true)} className={`px-4 py-2 rounded-xl text-xs font-black transition-all ${isEditing ? 'bg-green-600 text-white shadow-md' : 'bg-[#802B22] text-white opacity-80'}`}>
                            {isEditing ? "저장" : "편집"}
                        </button>
                    </header>

                    <Card className="border-t-8 border-[#802B22]">
                        <div className="flex items-center gap-2 mb-6"><div className="w-1.5 h-6 bg-[#802B22] rounded-full"></div><h3 className="text-xl font-black">예배 순서</h3></div>
                        <div className="space-y-4 text-sm font-medium">
                            <div className="flex flex-col gap-2 border-b border-gray-50 pb-3">
                                <div className="flex items-center">
                                    <span className="w-20 font-black text-gray-300 shrink-0">순PRS</span>
                                    {isEditing ? (
                                        <div className="flex-1 flex flex-col gap-2">
                                            <input value={form.prsBible || ""} onChange={e => setForm({...form, prsBible: e.target.value})} placeholder="말씀 입력 (예: 마 21:1~24:22)" className="w-full bg-gray-50 p-2 rounded-lg font-bold outline-none border-2 border-primary/10"/>
                                            <input value={form.prsLink || ""} onChange={e => setForm({...form, prsLink: e.target.value})} placeholder="유튜브 링크 입력" className="w-full bg-gray-50 p-2 rounded-lg font-bold outline-none border-2 border-primary/10"/>
                                        </div>
                                    ) : (
                                        <div className="flex flex-1 items-center justify-between">
                                            <span className="text-gray-700 font-bold">{form.prsBible || "말씀 미입력"}</span>
                                            <button onClick={() => form.prsLink && window.open(form.prsLink, '_blank')} className={`flex items-center gap-2 px-3 py-1.5 rounded-full font-bold text-xs transition-colors ${form.prsLink ? 'bg-red-50 text-red-600 active:scale-95' : 'bg-gray-50 text-gray-300 cursor-default'}`}>
                                                <Icon name="play-circle" className="w-4 h-4" /> 영상 시청
                                            </button>
                                        </div>
                                    )}
                                </div>
                            </div>

                            <div className="flex items-center border-b border-gray-50 pb-3">
                                <span className="w-20 font-black text-gray-300 shrink-0">기도</span>
                                {isEditing ? <input value={form.prayerLeader || ""} onChange={e => setForm({...form, prayerLeader: e.target.value})} className="flex-1 bg-gray-50 p-2 rounded-lg font-bold outline-none border-2 border-primary/20" /> : <span className="text-gray-700 font-bold">{form.prayerLeader || "순장"}</span>}
                            </div>
                            
                            <div className="space-y-3 border-b border-gray-50 pb-3">
                                <div className="flex items-center">
                                    <span className="w-20 font-black text-gray-300 shrink-0">찬양</span>
                                    {isEditing ? (
                                        <div className="flex-1 flex gap-2">
                                            <label className="flex-1 bg-blue-50 text-blue-600 p-2 rounded-lg font-black text-[10px] cursor-pointer text-center border-2 border-dashed border-blue-200 hover:bg-blue-100 transition-colors">
                                                악보1 업로드 <input type="file" hidden accept="image/*" onChange={(e) => handleImageUpload(e, 'musicImage')} />
                                            </label>
                                            <label className="flex-1 bg-blue-50 text-blue-600 p-2 rounded-lg font-black text-[10px] cursor-pointer text-center border-2 border-dashed border-blue-200 hover:bg-blue-100 transition-colors">
                                                악보2 업로드 <input type="file" hidden accept="image/*" onChange={(e) => handleImageUpload(e, 'musicImage2')} />
                                            </label>
                                        </div>
                                    ) : (
                                        <span className="text-gray-700 font-bold">오늘의 찬양</span>
                                    )}
                                </div>
                                <div className="pl-20 grid grid-cols-2 gap-2">
                                    {form.musicImage && (
                                        <div className="relative group overflow-hidden rounded-xl border border-gray-100 shadow-sm aspect-video bg-gray-50 cursor-zoom-in" onClick={() => setFullScreenImage(form.musicImage)}>
                                            <img src={form.musicImage} className="w-full h-full object-cover" />
                                            <div className="absolute inset-0 bg-black/5 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity"><Icon name="maximize" className="text-white" /></div>
                                        </div>
                                    )}
                                    {form.musicImage2 && (
                                        <div className="relative group overflow-hidden rounded-xl border border-gray-100 shadow-sm aspect-video bg-gray-50 cursor-zoom-in" onClick={() => setFullScreenImage(form.musicImage2)}>
                                            <img src={form.musicImage2} className="w-full h-full object-cover" />
                                            <div className="absolute inset-0 bg-black/5 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity"><Icon name="maximize" className="text-white" /></div>
                                        </div>
                                    )}
                                </div>
                            </div>

                            <div className="flex items-center border-b border-gray-50 pb-3">
                                <span className="w-20 font-black text-gray-300 shrink-0">성경봉독</span>
                                {isEditing ? (
                                    <input value={form.bibleVerse || ""} onChange={e => setForm({...form, bibleVerse: e.target.value})} className="flex-1 bg-gray-50 p-2 rounded-lg font-bold outline-none border-2 border-primary/20" />
                                ) : (
                                    <button onClick={() => form.bibleContent && setFullScreenBible(true)} className="flex items-center gap-1.5 text-primary font-bold underline underline-offset-4 decoration-2">
                                        {form.bibleVerse || "구절 입력"} <Icon name="maximize-2" className="w-3 h-3" />
                                    </button>
                                )}
                            </div>
                            {isEditing && (
                                <div className="pl-20 mb-3">
                                    <textarea value={form.bibleContent || ""} onChange={e => setForm({...form, bibleContent: e.target.value})} placeholder="성경 말씀 내용 입력..." className="w-full h-32 bg-gray-50 p-3 rounded-xl text-xs font-medium outline-none border-2 border-dashed border-gray-200" />
                                </div>
                            )}

                            <div className="flex items-center border-b border-gray-50 pb-3">
                                <span className="w-20 font-black text-gray-300 shrink-0">적용과 나눔</span>
                                {isEditing ? (
                                    <input value={form.applicationText !== undefined ? form.applicationText : "실천할 일을 결단하고 나누기"} onChange={e => setForm({...form, applicationText: e.target.value})} placeholder="적용과 나눔 내용 입력" className="flex-1 bg-gray-50 p-2 rounded-lg font-bold outline-none border-2 border-primary/20" />
                                ) : (
                                    <span className="text-orange-600 font-bold">{form.applicationText !== undefined ? form.applicationText : "실천할 일을 결단하고 나누기"}</span>
                                )}
                            </div>

                            <div className="flex items-center border-b border-gray-50 pb-3">
                                <span className="w-20 font-black text-gray-300 shrink-0">기도</span>
                                {isEditing ? (
                                    <input value={form.closingPrayerLeader || ""} onChange={e => setForm({...form, closingPrayerLeader: e.target.value})} placeholder="기도 담당자" className="flex-1 bg-gray-50 p-2 rounded-lg font-bold outline-none border-2 border-primary/20" />
                                ) : (
                                    <span className="text-gray-700 font-bold">{form.closingPrayerLeader || "다함께"}</span>
                                )}
                            </div>

                            <div className="flex items-center pb-1">
                                <span className="w-20 font-black text-gray-300 shrink-0">주기도문</span>
                                <span className="text-gray-700 font-bold">다함께</span>
                            </div>
                        </div>
                    </Card>

                    <Card className="border-t-8 border-gray-200 bg-white">
                        <div className="flex items-center gap-2 mb-4">
                            <Icon name="megaphone" className="text-[#802B22] w-5 h-5" />
                            <h3 className="text-xl font-black text-gray-800">광고 및 주요 일정</h3>
                        </div>
                        {isEditing ? (
                            <textarea value={form.announcements || ""} onChange={e => setForm({...form, announcements: e.target.value})} placeholder="광고 및 주요 일정 내용을 입력하세요..." className="w-full bg-gray-50 p-4 rounded-xl text-sm font-bold text-gray-700 outline-none border-2 border-gray-200 min-h-[150px] leading-relaxed" />
                        ) : (
                            <div className="text-sm text-gray-600 font-bold leading-relaxed whitespace-pre-wrap pl-2 border-l-4 border-gray-100 min-h-[40px]">
                                {form.announcements || "등록된 광고 및 일정이 없습니다."}
                            </div>
                        )}
                    </Card>

                    {fullScreenImage && (
                        <div className="fixed inset-0 z-[100] bg-black/90 flex items-center justify-center p-4 fade-in" onClick={() => setFullScreenImage(null)}>
                            <button className="absolute top-6 right-6 text-white p-2 bg-white/10 rounded-full"><Icon name="x" className="w-8 h-8" /></button>
                            <img src={fullScreenImage} className="max-w-full max-h-full object-contain shadow-2xl rounded-lg" />
                        </div>
                    )}

                    {fullScreenBible && (
                        <div className="fixed inset-0 z-[100] bg-white flex flex-col p-8 fade-in overflow-y-auto" onClick={() => setFullScreenBible(false)}>
                            <div className="flex justify-between items-center mb-8 shrink-0">
                                <span className="text-[#802B22] font-black tracking-widest uppercase text-xs">Scripture Reading</span>
                                <button className="p-2 text-gray-300"><Icon name="x" className="w-8 h-8" /></button>
                            </div>
                            <div className="mb-6"><h2 className="text-3xl font-black text-gray-900 leading-tight">{form.bibleVerse}</h2></div>
                            <div className="flex-1"><p className="text-2xl font-bold text-gray-700 leading-relaxed whitespace-pre-wrap">{form.bibleContent}</p></div>
                            <div className="mt-12 text-center text-gray-300 font-bold text-sm">탭하면 닫힙니다</div>
                        </div>
                    )}
                </div>
            );
        };

        // --- View 3: 순원기도제목 ---
        const extractTags = (text) => {
            if (!text) return [];
            const tags = new Set();
            if (/건강|치료|회복|수술|아픔|병원|항암/.test(text)) tags.add('건강/치료');
            if (/직장|취업|이직|회사|면접|승진|업무|사업|매출|계약/.test(text)) tags.add('직장/사업');
            if (/가정|남편|아내|부부|결혼|시댁|처가/.test(text)) tags.add('가정/부부');
            if (/자녀|아들|딸|아이|임신|출산|육아/.test(text)) tags.add('자녀');
            if (/학업|시험|학교|대학|수능|합격|공부|진로/.test(text)) tags.add('학업/진로');
            if (/관계|갈등|마음|우울|평안|위로/.test(text)) tags.add('마음/평안');
            if (/신앙|예배|말씀|교회|성령|은혜|순장|사역|기도/.test(text)) tags.add('신앙/사역');
            if (/이사|청약|집|거주/.test(text)) tags.add('이사/거주');
            return Array.from(tags).slice(0, 3); 
        };

        const PrayerCard = ({ m, onUpdate, forceExpand }) => {
            const [isEditing, setIsEditing] = useState(false);
            const [isExpanded, setIsExpanded] = useState(false);
            const [draft, setDraft] = useState(m.prayer || "");
            
            useEffect(() => {
                setIsExpanded(forceExpand);
                if (!forceExpand) setIsEditing(false);
            }, [forceExpand]);

            const tags = extractTags(m.prayer);

            const handleSave = () => {
                onUpdate(m.id, draft);
                setIsEditing(false);
            };

            return (
                <Card className="p-0 transition-all overflow-hidden border border-gray-100 shadow-sm">
                    <div className="p-6 flex justify-between items-start cursor-pointer active:bg-gray-50 transition-colors" onClick={() => !isEditing && setIsExpanded(!isExpanded)}>
                        <div className="flex items-center gap-4">
                            <div className="w-12 h-12 rounded-full flex items-center justify-center font-black text-lg shrink-0 bg-red-50 text-[#802B22]">{m.name[0]}</div>
                            <div>
                                <div className="flex items-center gap-2">
                                    <span className="text-xl font-black text-gray-800">{m.name}</span>
                                    {m.role && <span className="text-xs font-bold text-gray-400">{m.role}</span>}
                                </div>
                                {tags.length > 0 && !isEditing && (
                                    <div className="flex flex-wrap gap-1.5 mt-1.5">
                                        {tags.map(tag => <span key={tag} className="text-[10px] font-black bg-gray-100 text-gray-500 px-2 py-0.5 rounded-md border border-gray-200">#{tag}</span>)}
                                    </div>
                                )}
                            </div>
                        </div>
                        {!isExpanded && <Icon name="chevron-down" className="text-gray-300 w-5 h-5 mt-3 shrink-0" />}
                        {isExpanded && !isEditing && <Icon name="chevron-up" className="text-gray-300 w-5 h-5 mt-3 shrink-0" />}
                    </div>

                    {isExpanded && (
                        <div className="px-6 pb-6 border-t border-gray-50 pt-4 bg-gray-50/30">
                            {isEditing ? (
                                <div className="space-y-3 fade-in">
                                    <textarea
                                        value={draft}
                                        onChange={e => setDraft(e.target.value)}
                                        placeholder="기도제목을 상세히 입력하세요..."
                                        className="w-full bg-white p-4 rounded-2xl border border-gray-200 text-base font-medium outline-none focus:border-[#802B22] min-h-[120px] resize-none text-gray-800 shadow-inner"
                                        autoFocus
                                    />
                                    <div className="flex justify-end gap-2">
                                        <button onClick={() => { setIsEditing(false); setDraft(m.prayer||""); }} className="px-4 py-2 bg-gray-200 text-gray-600 text-xs font-black rounded-xl active:scale-95">취소</button>
                                        <button onClick={handleSave} className="px-5 py-2 bg-[#802B22] text-white text-xs font-black rounded-xl active:scale-95 shadow-md">저장 완료</button>
                                    </div>
                                </div>
                            ) : (
                                <div className="relative fade-in">
                                    {m.prayer ? (
                                        <p className="text-base text-gray-800 font-bold leading-relaxed whitespace-pre-wrap pr-10">{m.prayer}</p>
                                    ) : (
                                        <p className="text-sm text-gray-400 font-bold italic py-2">등록된 기도제목이 없습니다.</p>
                                    )}
                                    <button onClick={(e) => { e.stopPropagation(); setIsEditing(true); setDraft(m.prayer || ""); }} className="absolute top-0 right-0 p-2 text-gray-400 bg-white rounded-lg border border-gray-200 hover:text-[#802B22] transition-colors active:scale-95 shadow-sm">
                                        <Icon name="edit-3" className="w-4 h-4" />
                                    </button>
                                </div>
                            )}
                        </div>
                    )}
                </Card>
            );
        };

        const PrayerListView = ({ members, onUpdate }) => {
            const activeMembers = useMemo(() => members.filter(m => m.isParticipating && m.name.trim() !== ''), [members]);
            
            const [shuffledIds, setShuffledIds] = useState([]);
            useEffect(() => {
                const ids = activeMembers.map(m => m.id);
                ids.sort(() => Math.random() - 0.5);
                setShuffledIds(ids);
            }, [activeMembers.length]); 

            const displayMembers = useMemo(() => {
                if (shuffledIds.length === 0) return activeMembers;
                const membersById = {};
                activeMembers.forEach(m => { membersById[m.id] = m; });
                return shuffledIds.map(id => membersById[id]).filter(Boolean);
            }, [activeMembers, shuffledIds]);

            const allTags = useMemo(() => {
                const tags = new Set();
                activeMembers.forEach(m => extractTags(m.prayer).forEach(t => tags.add(t)));
                return Array.from(tags);
            }, [activeMembers]);

            const [selectedTag, setSelectedTag] = useState(null);
            const [isAllExpanded, setIsAllExpanded] = useState(false);

            const filteredMembers = useMemo(() => {
                if (!selectedTag) return displayMembers;
                return displayMembers.filter(m => extractTags(m.prayer).includes(selectedTag));
            }, [displayMembers, selectedTag]);

            return (
                <div className="space-y-6 animate-slide-up pb-10">
                    <header>
                        <span className="text-[#802B22] font-black text-[10px] tracking-widest uppercase">Community</span>
                        <h1 className="text-2xl font-black mt-1">순원 기도제목</h1>
                    </header>

                    {/* 분석된 태그 필터 영역 */}
                    <div className="flex flex-wrap gap-2">
                        <button onClick={() => setSelectedTag(null)} className={`px-4 py-2 rounded-full text-xs font-black transition-colors ${!selectedTag ? 'bg-[#802B22] text-white shadow-md' : 'bg-white border border-gray-200 text-gray-500'}`}>전체보기</button>
                        {allTags.map(tag => (
                            <button key={tag} onClick={() => setSelectedTag(selectedTag === tag ? null : tag)} className={`px-4 py-2 rounded-full text-xs font-black transition-colors ${selectedTag === tag ? 'bg-[#802B22] text-white shadow-md' : 'bg-white border border-gray-200 text-gray-500'}`}>#{tag}</button>
                        ))}
                    </div>

                    <div className="flex justify-end">
                        <button onClick={() => setIsAllExpanded(!isAllExpanded)} className="text-xs font-black text-[#802B22] flex items-center gap-1 bg-red-50 px-3 py-1.5 rounded-lg active:scale-95 transition-transform shadow-sm">
                            <Icon name={isAllExpanded ? "chevrons-up" : "chevrons-down"} className="w-3.5 h-3.5" />
                            {isAllExpanded ? "기도제목 모두 접기" : "기도제목 모두 펼치기"}
                        </button>
                    </div>

                    <div className="space-y-4">
                        {filteredMembers.length === 0 && <div className="text-center py-10 text-gray-400 font-bold text-sm">해당되는 기도제목이 없습니다.</div>}
                        {filteredMembers.map(m => (
                            <PrayerCard key={m.id} m={m} onUpdate={onUpdate} forceExpand={isAllExpanded} />
                        ))}
                    </div>
                </div>
            );
        };

        // --- View 4: 가족 단위 명단(테이블) 모달 ---
        const DirectoryModal = ({ members, onClose, onGlobalSave, onAddFamily, onDeleteFamily, adminPass, onChangeAdminPass }) => {
            const [isAdmin, setIsAdmin] = useState(false);
            const [authInput, setAuthInput] = useState('');
            const [showAuth, setShowAuth] = useState(false);
            const [authError, setAuthError] = useState('');
            const [showChangePwd, setShowChangePwd] = useState(false);
            const [newPwd, setNewPwd] = useState('');

            const [drafts, setDrafts] = useState({});
            const [hasChanges, setHasChanges] = useState(false);

            const groupedFamilies = useMemo(() => {
                const map = new Map();
                members.forEach(m => {
                    const fId = m.familyId || m.id; 
                    if (!map.has(fId)) {
                        map.set(fId, { id: fId, husband: null, wife: null, children: m.children || '', vehicle: m.vehicle || '', order: m.order || 99 });
                    }
                    const g = map.get(fId);
                    if (m.gender === 'M') g.husband = m;
                    else if (m.gender === 'F') g.wife = m;
                    if (m.children) g.children = m.children;
                    if (m.vehicle) g.vehicle = m.vehicle;
                });
                return Array.from(map.values()).sort((a,b) => a.order - b.order);
            }, [members]);

            useEffect(() => {
                if (isAdmin) {
                    const initialDrafts = {};
                    groupedFamilies.forEach(f => {
                        initialDrafts[f.id] = {
                            hName: f.husband?.name || '', hRole: f.husband?.role || '', hPart: f.husband?.isParticipating || false,
                            wName: f.wife?.name || '', wRole: f.wife?.role || '', wPart: f.wife?.isParticipating || false,
                            children: f.children || '', vehicle: f.vehicle || ''
                        };
                    });
                    setDrafts(initialDrafts);
                    setHasChanges(false);
                }
            }, [isAdmin, groupedFamilies]);

            const handleLogin = () => {
                if (authInput === adminPass) {
                    setIsAdmin(true); setShowAuth(false); setAuthInput(''); setAuthError('');
                } else { 
                    setAuthError('비밀번호가 일치하지 않습니다.'); 
                }
            };

            const handleChangePwd = () => {
                onChangeAdminPass(newPwd); setShowChangePwd(false); setNewPwd('');
                alert("관리자 비밀번호가 변경되었습니다.");
            };

            const executeGlobalSave = async (showAlert = true) => {
                await onGlobalSave(groupedFamilies, drafts);
                setHasChanges(false);
                if (showAlert) alert('명단 업데이트가 저장되었습니다.');
            };

            const handleBack = () => {
                if (isAdmin) {
                    if (hasChanges) {
                        if (confirm("변경 사항을 저장하시겠습니까?\n[확인] 저장 후 조회 모드로 이동\n[취소] 저장하지 않고 조회 모드로 이동")) {
                            executeGlobalSave(false).then(() => setIsAdmin(false));
                        } else {
                            setIsAdmin(false);
                            setHasChanges(false);
                        }
                    } else {
                        setIsAdmin(false);
                    }
                } else {
                    onClose();
                }
            };

            return (
                <div className="fixed inset-0 z-[150] bg-white flex flex-col animate-slide-up">
                    <header className="p-4 bg-white flex items-center justify-between border-b border-gray-100 shrink-0 shadow-sm safe-top">
                        <div className="flex items-center gap-3">
                            <button onClick={handleBack} className="p-2 bg-gray-50 rounded-full text-gray-500 active:scale-95 transition-transform"><Icon name="chevron-left" className="w-5 h-5" /></button>
                            <h2 className="text-lg font-black text-gray-800 tracking-tighter">순원명단</h2>
                        </div>
                        {isAdmin ? (
                            <div className="flex gap-2">
                                <button onClick={() => setShowChangePwd(true)} className="px-3 py-1.5 bg-gray-100 text-gray-600 text-[10px] font-black rounded-lg active:scale-95">비번변경</button>
                                <button onClick={async () => {
                                    if (hasChanges) await executeGlobalSave(false);
                                    onAddFamily();
                                }} className="px-3 py-1.5 bg-gray-800 text-white text-[10px] font-black rounded-lg active:scale-95">새 가족 추가</button>
                                <button onClick={() => executeGlobalSave(true)} className="px-3 py-1.5 bg-[#802B22] text-white text-xs font-black rounded-lg active:scale-95 shadow-md flex items-center gap-1"><Icon name="save" className="w-3 h-3"/>업데이트 저장</button>
                            </div>
                        ) : (

            }, []);

            const handleUpdateGuide = async (newData) => {
                const { db, doc, setDoc, appId } = window.FB_SDK;
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'guide'), newData);
            };

            const handleUpdateFinanceEdits = async (carryOver, edits) => {
                const { db, doc, setDoc, updateDoc, appId } = window.FB_SDK;
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'finance'), { carryOver: Number(carryOver) });
                for (const id in edits) {
                    if (edits[id] !== undefined) {
                        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'worship', id), { offering: Number(edits[id]) });
                    }
                }
            };

            const handleUpdateRecord = async (id, data) => {
                const { db, doc, updateDoc, appId } = window.FB_SDK;
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'worship', id), {
                    date: data.date, type: data.type || "순예배", members: data.members, offering: Number(data.offering) || 0
                });
            };

            const handleDeleteRecord = async (id) => {
                const { db, doc, deleteDoc, appId } = window.FB_SDK;
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'worship', id));
            };

            const handleUpdatePrayer = async (id, prayer) => {
                const { db, doc, updateDoc, appId } = window.FB_SDK;
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'members', id), { prayer });
            };

            const handleGlobalSaveFamilyInfo = async (families, draftsMap) => {
                const { db, doc, updateDoc, appId } = window.FB_SDK;
                const promises = [];
                for (const f of families) {
                    const draft = draftsMap[f.id];
                    if (!draft) continue;
                    if (f.husband?.id) {
                        promises.push(updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'members', f.husband.id), {
                            name: draft.hName, role: draft.hRole, isParticipating: draft.hPart, children: draft.children, vehicle: draft.vehicle
                        }));
                    }
                    if (f.wife?.id) {
                        promises.push(updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'members', f.wife.id), {
                            name: draft.wName, role: draft.wRole, isParticipating: draft.wPart, children: draft.children, vehicle: draft.vehicle
                        }));
                    }
                }
                await Promise.all(promises);
            };

            const handleAddFamily = async () => {
                const { db, collection, addDoc, appId } = window.FB_SDK;
                const newId = "f_" + new Date().getTime();
                const newOrder = members.length + 1;
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'members'), { familyId: newId, name: "", role: "", gender: "M", children: "", vehicle: "", prayer: "", isParticipating: false, order: newOrder });
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'members'), { familyId: newId, name: "", role: "", gender: "F", children: "", vehicle: "", prayer: "", isParticipating: false, order: newOrder + 1 });
            };

            const handleDeleteFamily = async (familyId) => {
                if(!confirm("이 가족 명단을 완전히 삭제하시겠습니까? (되돌릴 수 없습니다)")) return;
                const { db, doc, deleteDoc, appId } = window.FB_SDK;
                const familyMembers = members.filter(m => (m.familyId || m.id) === familyId);
                for (const m of familyMembers) {
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'members', m.id));
                }
            };

            const handleChangeAdminPass = async (newPwd) => {
                const { db, doc, setDoc, appId } = window.FB_SDK;
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'admin'), { password: newPwd });
                setAdminPass(newPwd);
            };

            if (!ready) return <div className="h-screen flex items-center justify-center"><div className="w-12 h-12 border-4 border-[#802B22] border-t-transparent rounded-full animate-spin"></div></div>;

            return (
                <div className="h-screen flex flex-col max-w-md mx-auto relative overflow-hidden bg-[#F3F4F6]">
                    <div className="p-5 bg-white flex items-center gap-3 border-b border-gray-100 shrink-0 shadow-sm z-10">
                        <img src="https://raw.githubusercontent.com/jongsungjoo/grace/refs/heads/main/logo.png" className="w-9 h-9 object-contain rounded-xl" alt="logo" />
                        <h2 className="text-[19px] font-black tracking-tighter text-gray-800">온유공동체 다윗 5순 매니져</h2>
                    </div>

                    <div className="flex-1 overflow-y-auto p-6 pb-32 hide-scrollbar">
                        {view === 'prayer' && <PrayerListView members={members} onUpdate={handleUpdatePrayer} />}
                        {view === 'guide' && <WorshipGuideView guideData={guideData} onUpdateGuide={handleUpdateGuide} />}
                        {view === 'history' && <WorshipHistoryView history={history} members={members} finance={finance} onUpdateFinanceEdits={handleUpdateFinanceEdits} onUpdateRecord={handleUpdateRecord} onDeleteRecord={handleDeleteRecord} onOpenDirectory={() => setShowDirectory(true)} onAddRecord={async (r) => { const { db, collection, addDoc, appId } = window.FB_SDK; await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'worship'), r); }} />}
                    </div>

                    <nav className="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white/90 backdrop-blur-xl border-t border-gray-100 h-24 safe-bottom flex justify-around items-center z-50 px-4 shadow-[0_-5px_20px_rgba(0,0,0,0.02)]">
                        {[
                            { id: 'prayer', icon: 'users', label: '순원기도제목' },
                            { id: 'guide', icon: 'book-open', label: '순예배안내' },
                            { id: 'history', icon: 'calendar-days', label: '순예배기록' }
                        ].map(t => (
                            <button key={t.id} onClick={() => setView(t.id)} className={`flex flex-col items-center gap-1.5 transition-all ${view === t.id ? 'text-[#802B22] scale-110' : 'text-gray-300'}`}>
                                <Icon name={t.icon} className="w-6 h-6" />
                                <span className="text-[10px] font-black tracking-tighter">{t.label}</span>
                            </button>
                        ))}
                    </nav>

                    {showDirectory && <DirectoryModal members={members} onClose={() => setShowDirectory(false)} onGlobalSave={handleGlobalSaveFamilyInfo} onAddFamily={handleAddFamily} onDeleteFamily={handleDeleteFamily} adminPass={adminPass} onChangeAdminPass={handleChangeAdminPass} />}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
